# Prometheus configuration for Notification Service
global:
  scrape_interval: 15s
  evaluation_interval: 15s 

scrape_configs:
  - job_name: "notification-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          application: "notification-service"
          environment: "dev"